services:
  - type: web
    name: kapido-backend
    runtime: python
    rootDir: backend
    buildCommand: python -m pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9